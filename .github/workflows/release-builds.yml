name: Release Builds

# Builds release tarballs for all supported platforms, including Linux aarch64.
# Triggered on version tags (v*) or manually.
# Fixes: https://github.com/hyperspaceai/agi/issues/16

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v5.21.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          # Linux aarch64 — fixes issue #16
          - os: linux
            arch: aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

          # macOS x86_64
          - os: macos
            arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin

          # macOS arm64 (Apple Silicon)
          - os: macos
            arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin

          # Windows x86_64
          - os: windows
            arch: x86_64
            runner: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build binary
        run: npm run build:binary -- --target ${{ matrix.target }}
        env:
          NODE_ENV: production

      - name: Package tarball (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ARCHIVE="hyperspace-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist hyperspace
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $ARCHIVE = "hyperspace-${VERSION}-windows-x86_64.zip"
          Compress-Archive -Path dist\hyperspace.exe -DestinationPath $ARCHIVE
          "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperspace-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  release:
    name: Attach builds to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
