version: 1
project: architect
description: >
  Autonomous task decomposition — agents generate and evolve DAG planning
  strategies scored by decomposition quality (depth × parallelism × success_rate).

# Dataset: synthetic task prompts generated by the evaluator (no download needed)
data:
  dataset: synthetic-task-prompts
  generator: architect_prompt_generator
  numSamples: 200
  seed: 42

# Evaluation: score = depth * parallelism_factor * success_rate
# depth: how many nested levels the DAG reaches (target >= 5)
# parallelism_factor: max concurrent tasks / total tasks
# success_rate: fraction of generated plans that execute without errors
evaluation:
  metric: dag_quality_score
  targetDepth: 5
  targetParallelism: 0.4
  evalSamples: 50

# Baseline model: simple greedy decomposer (no LLM, rule-based)
architecture:
  nLayers: 2
  nHeads: 2
  dModel: 64
  dFF: 256
  contextLength: 256
  vocabSize: 128
  activation: gelu
  normalization: layernorm
  positionEncoding: learned
  tieEmbeddings: true
  residualScale: 1.0
  dropoutRate: 0.0

optimizer:
  type: adamw
  learningRate: 0.0003
  weightDecay: 0.01
  beta1: 0.9
  beta2: 0.999
  epsilon: 0.00000001
  gradientClipNorm: 1.0

schedule:
  type: cosine
  warmupSteps: 100
  minLRRatio: 0.1

training:
  batchSize: 8
  maxSteps: 500
  maxDurationSec: 300
  evalInterval: 50
  evalSteps: 10
