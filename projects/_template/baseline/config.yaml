version: 1
architecture:
  nLayers: 2
  nHeads: 2
  dModel: 64
  dFF: 256
  contextLength: 128
  vocabSize: 128
  activation: gelu
  normalization: layernorm
  positionEncoding: learned
  tieEmbeddings: true
  residualScale: 1.0
  dropoutRate: 0.0
optimizer:
  type: adamw
  learningRate: 0.0003
  weightDecay: 0.01
  beta1: 0.9
  beta2: 0.999
  epsilon: 0.00000001
  gradientClipNorm: 1.0
schedule:
  type: cosine
  warmupSteps: 100
  minLRRatio: 0.1
training:
  batchSize: 8
  maxSteps: 500
  maxDurationSec: 300
  evalInterval: 50
  evalSteps: 10
data:
  dataset: your-dataset
  tokenizer: char
